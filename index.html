<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linq 단어 학습</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh;padding:1.5rem}
.app{max-width:720px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.header-left{display:flex;align-items:center;gap:10px}
.header h1{font-size:20px;font-weight:500}
.user-badge{font-size:13px;color:#666;background:#eee;padding:4px 12px;border-radius:20px}
.tabs{display:flex;gap:6px;margin-bottom:1rem}
.tab{padding:6px 14px;border-radius:8px;border:0.5px solid #ddd;background:#eee;font-size:13px;cursor:pointer;color:#666}
.tab.active{background:#1a1a1a;color:#fff;border-color:transparent}
.card{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1rem;margin-bottom:1rem}
label{font-size:13px;color:#666;display:block;margin-bottom:6px}
textarea{width:100%;font-size:14px;padding:8px;border:0.5px solid #ccc;border-radius:8px;background:#f8f8f8;color:#1a1a1a;font-family:inherit;resize:vertical}
input[type=text]{width:100%;font-size:14px;padding:8px;border:0.5px solid #ccc;border-radius:8px;background:#f8f8f8;color:#1a1a1a;font-family:inherit}
textarea:focus,input:focus{outline:none;border-color:#888}
.btn{padding:7px 14px;border:0.5px solid #ccc;border-radius:8px;background:#eee;color:#1a1a1a;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#e0e0e0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:transparent}
.btn.primary:hover{background:#333}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn.done{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.btn.save{background:#E6F1FB;color:#0C447C;border-color:#378ADD}
.divider{border:none;border-top:0.5px solid #eee;margin:10px 0}
.reader{background:#fff;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.25rem;line-height:2.2;font-size:15px;-webkit-user-select:none;user-select:none;touch-action:none}
.word{display:inline;padding:1px 1px;margin:0;border-radius:2px;cursor:pointer}
.word.word-stop{background:none;cursor:pointer}
.word.unknown{background:#E6F1FB;color:#0C447C;text-decoration:underline dotted #378ADD}
.word.status-1{background:#FAECE7;color:#993C1D}
.word.status-2{background:#FAEEDA;color:#854F0B}
.word.status-3{color:#999;cursor:default}
.word.drag-hl{background:#EEEDFE;color:#3C3489;outline:2px solid #7F77DD}
.panel{margin-top:10px;background:#fff;border:0.5px solid #ccc;border-radius:12px;padding:1rem;display:none}
.panel.show{display:block}
.panel.phrase-panel{border-color:#7F77DD}
.panel-word{font-size:15px;font-weight:500;margin-bottom:8px}
.meaning-row{display:flex;gap:6px;align-items:center;margin-bottom:10px}
.meaning-input{flex:1;font-size:13px;padding:6px 9px;border:0.5px solid #ccc;border-radius:8px;background:#f8f8f8;color:#1a1a1a;font-family:inherit}
.meaning-input:focus{outline:none;border-color:#888}
.retranslate-btn{padding:5px 9px;border:0.5px solid #ccc;border-radius:8px;background:#f0f0f0;color:#666;font-size:12px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.retranslate-btn:hover{background:#e0e0e0}
.retranslate-btn:disabled{opacity:0.4;cursor:not-allowed}
.status-btns{display:flex;gap:6px}
.sbtn{flex:1;padding:6px 4px;border-radius:8px;border:0.5px solid #ccc;font-size:12px;cursor:pointer;text-align:center;background:#f0f0f0}
.sbtn.s1{background:#FAECE7;color:#993C1D;border-color:#F0997B}
.sbtn.s2{background:#FAEEDA;color:#854F0B;border-color:#FAC775}
.sbtn.s3{background:#EAF3DE;color:#3B6D11;border-color:#97C459}
.phrase-label{font-size:11px;color:#534AB7;margin-bottom:4px}
.stats{display:flex;gap:8px;margin-top:1rem}
.stat{flex:1;background:#f5f5f3;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:500}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.empty-msg{color:#999;font-size:14px;text-align:center;padding:2rem 0}
.vocab-list{display:flex;flex-direction:column;gap:6px;max-height:400px;overflow-y:auto}
.vocab-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:0.5px solid #e0e0e0;border-radius:8px;background:#fff}
.vocab-word{font-weight:500;font-size:14px;min-width:120px}
.vocab-meaning-edit{font-size:13px;flex:1;padding:3px 7px;border:0.5px solid #ccc;border-radius:6px;background:#f8f8f8;font-family:inherit}
.badge{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap}
.b1{background:#FAECE7;color:#993C1D}.b2{background:#FAEEDA;color:#854F0B}.b3{background:#EAF3DE;color:#3B6D11}.bphrase{background:#EEEDFE;color:#534AB7}
.loading-bar{background:#f0f0f0;border:0.5px solid #e0e0e0;border-radius:12px;padding:1.25rem;text-align:center;color:#666;font-size:14px;display:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #ddd;border-top-color:#333;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:-3px;margin-right:8px}
.mini-spinner{display:inline-block;width:12px;height:12px;border:1.5px solid #ddd;border-top-color:#666;border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:-2px}
@keyframes spin{to{transform:rotate(360deg)}}
.actions-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border-radius:10px;border:0.5px solid #ddd;font-size:12px;cursor:pointer;background:#f0f0f0;color:#666}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:transparent}
.hint{font-size:12px;color:#999;margin-top:8px}
.save-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.save-status{font-size:12px;color:#999}

/* 로그인 화면 */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem}
#login-screen h2{font-size:18px;font-weight:500}
#login-screen p{font-size:13px;color:#888}
#login-screen input{max-width:280px;text-align:center;font-size:16px}
#login-screen .btn{padding:10px 28px;font-size:14px}
</style>
</head>
<body>
<div class="app">

  <!-- 로그인 화면 -->
  <div id="login-screen">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
    <h2>Linq 단어 학습</h2>
    <p>이름을 입력하면 내 단어장이 저장돼요</p>
    <input type="text" id="name-input" placeholder="이름 입력 (예: 김철수)" maxlength="20">
    <button class="btn primary" onclick="login()">시작하기</button>
  </div>

  <!-- 메인 앱 -->
  <div id="main-app" style="display:none">
    <div class="header">
      <div class="header-left">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <h1>Linq 단어 학습</h1>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="user-badge" id="user-badge"></span>
        <button class="btn" onclick="logout()" style="font-size:12px;padding:4px 10px">로그아웃</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('read')">읽기</button>
      <button class="tab" onclick="switchTab('vocab')">단어장</button>
    </div>

    <div id="tab-read">
      <div class="card">
        <label>텍스트 입력</label>
        <textarea id="text-input" style="height:100px" placeholder="학습할 텍스트를 붙여넣기 하세요..."></textarea>
        <div class="divider"></div>
        <label>이미 아는 단어 (쉼표로 구분 — 입력한 단어만 제외)</label>
        <textarea id="known-input" style="height:40px" placeholder="je, tu, il, ..."></textarea>
        <div class="actions-row">
          <button class="btn primary" id="start-btn" onclick="startLearning()">▶ 학습 시작</button>
          <button class="btn" onclick="loadSample()">예시 보기</button>
        </div>
      </div>

      <div class="loading-bar" id="loading-bar"><span class="spinner"></span> DeepL 번역 중...</div>
      <div class="reader" id="reader"><p class="empty-msg">위에서 텍스트를 입력하고 학습 시작을 눌러주세요.</p></div>

      <div class="panel" id="word-panel">
        <div class="panel-word" id="panel-word"></div>
        <div class="meaning-row">
          <input class="meaning-input" id="meaning-input" type="text" placeholder="뜻 입력...">
          <button class="retranslate-btn" id="retranslate-btn" onclick="retranslateWord()">↺ 다시 번역</button>
        </div>
        <div class="status-btns">
          <button class="sbtn s1" onclick="setStatus(1)">🔁 다시 보기</button>
          <button class="sbtn s2" onclick="setStatus(2)">✓ 복습함</button>
          <button class="sbtn s3" onclick="setStatus(3)">⭐ 아는 단어</button>
        </div>
      </div>

      <div class="panel phrase-panel" id="phrase-panel">
        <div class="phrase-label">💬 선택한 표현</div>
        <div class="panel-word" id="phrase-panel-word"></div>
        <div class="meaning-row">
          <input class="meaning-input" id="phrase-meaning-input" type="text" placeholder="번역 중...">
          <button class="retranslate-btn" id="phrase-retranslate-btn" onclick="retranslatePhrase()">↺ 다시 번역</button>
        </div>
        <div class="status-btns">
          <button class="sbtn s1" onclick="savePhraseStatus(1)">🔁 다시 보기</button>
          <button class="sbtn s2" onclick="savePhraseStatus(2)">✓ 복습함</button>
          <button class="sbtn s3" onclick="savePhraseStatus(3)">⭐ 아는 표현</button>
        </div>
      </div>

      <div class="hint" id="drag-hint" style="display:none">✋ 단어를 드래그하면 표현으로 묶어서 저장할 수 있어요</div>

      <div class="stats" id="stats" style="display:none;margin-top:1rem">
        <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-label">미분류</div></div>
        <div class="stat"><div class="stat-num" id="s-retry" style="color:#993C1D">0</div><div class="stat-label">다시 보기</div></div>
        <div class="stat"><div class="stat-num" id="s-review" style="color:#854F0B">0</div><div class="stat-label">복습 중</div></div>
        <div class="stat"><div class="stat-num" id="s-known3" style="color:#3B6D11">0</div><div class="stat-label">아는 단어</div></div>
      </div>
      <div id="done-btn-wrap" style="display:none;margin-top:12px">
        <div class="save-row">
          <button class="btn done" onclick="markAllUnclickedAsKnown()">✓✓ 학습 완료</button>
          <button class="btn save" onclick="saveVocab()">💾 단어장 저장</button>
          <span class="save-status" id="save-status"></span>
        </div>
      </div>
    </div>

    <div id="tab-vocab" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="filter-row" style="margin:0">
          <button class="filter-btn active" onclick="filterVocab('all',this)">전체</button>
          <button class="filter-btn" onclick="filterVocab(1,this)">🔁 다시 보기</button>
          <button class="filter-btn" onclick="filterVocab(2,this)">✓ 복습 중</button>
          <button class="filter-btn" onclick="filterVocab(3,this)">⭐ 아는 단어</button>
          <button class="filter-btn" onclick="filterVocab('phrase',this)">💬 표현</button>
        </div>
        <button class="btn save" onclick="saveVocab()" style="font-size:12px;padding:5px 10px">💾 저장</button>
      </div>
      <div class="vocab-list" id="vocab-list"><p class="empty-msg" style="padding:1.5rem 0">아직 분류한 단어가 없어요.</p></div>
    </div>
  </div>
</div>

<script>
const FR_STOP=new Set(['le','la','les','de','du','des','un','une','en','et','a','à','au','aux','ce','se','si','on','ou','ne','que','qui','par','sur','sous','avec','dans','pour','est','sont','avoir','être','mais','donc','or','ni','car','je','tu','il','elle','nous','vous','ils','elles','me','te','lui','y','d','l','j','n','m','s','c','qu','par','dont','y','en','lui','leur','leurs']);
const SAMPLE=`Dans le cadre du protocole d'accord signé entre les deux pays, les représentants ont convenu d'établir un comité mixte pour surveiller l'application des mesures économiques. Cette initiative vise à renforcer la coopération bilatérale et à promouvoir des échanges commerciaux équitables.`;

let currentUser='';
let wordStatus={},wordDict={},phraseDict={},clickedWords=new Set();
let currentWord=null,currentPhrase=null,vocabFilter='all';
let allWordEls=[],startIdx=null,dragging=false;

// 이름 입력 후 엔터
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')login();});

function login(){
  const name=document.getElementById('name-input').value.trim();
  if(!name){alert('이름을 입력해주세요.');return;}
  currentUser=name;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('user-badge').textContent=name+'님';
  loadVocab();
}

function logout(){
  currentUser='';
  wordStatus={};wordDict={};phraseDict={};
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-app').style.display='none';
  document.getElementById('name-input').value='';
}

async function saveVocab(){
  const st=document.getElementById('save-status');
  if(st)st.textContent='저장 중...';
  try{
    await fetch('/vocab/'+encodeURIComponent(currentUser),{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({wordStatus,wordDict,phraseDict})
    });
    if(st)st.textContent='✓ 저장됨';
    setTimeout(()=>{if(st)st.textContent='';},2000);
  }catch(e){if(st)st.textContent='저장 실패';}
}

async function loadVocab(){
  try{
    const res=await fetch('/vocab/'+encodeURIComponent(currentUser));
    const data=await res.json();
    if(data.wordStatus)wordStatus=data.wordStatus;
    if(data.wordDict)wordDict=data.wordDict;
    if(data.phraseDict)phraseDict=data.phraseDict;
  }catch(e){}
}

async function deepl(texts){
  const res=await fetch('/translate',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({texts:Array.isArray(texts)?texts:[texts]})
  });
  if(!res.ok)throw new Error('번역 서버 오류: '+res.status);
  const data=await res.json();
  return data.translations.map(t=>t.text);
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(t==='read'&&i===0)||(t==='vocab'&&i===1)));
  document.getElementById('tab-read').style.display=t==='read'?'block':'none';
  document.getElementById('tab-vocab').style.display=t==='vocab'?'block':'none';
  if(t==='vocab')renderVocab();
}

function loadSample(){
  document.getElementById('text-input').value=SAMPLE;
  document.getElementById('known-input').value='dans,entre,deux,ont,cette,pour,les,des';
}

async function startLearning(){
  const text=document.getElementById('text-input').value.trim();
  if(!text)return;
  const userKnown=new Set(document.getElementById('known-input').value.split(',').map(w=>w.trim().toLowerCase()).filter(Boolean));
  const known=userKnown; // FR_STOP 자동 제외 없음 — 전치사/관사도 모두 표시
  const tokens=tokenize(text);
  const allWords=[...new Set(tokens.filter(t=>t.type==='word').map(t=>t.clean).filter(w=>w.length>0&&!known.has(w)))];
  const prevStatus={...wordStatus};
  wordStatus={};clickedWords=new Set();allWordEls=[];
  allWords.forEach(w=>wordStatus[w]=prevStatus[w]||'unknown');
  hideWordPanel();hidePhrasePanel();

  document.getElementById('loading-bar').style.display='block';
  document.getElementById('start-btn').disabled=true;
  document.getElementById('reader').innerHTML='<p class="empty-msg">번역 중...</p>';
  document.getElementById('stats').style.display='none';
  document.getElementById('done-btn-wrap').style.display='none';
  document.getElementById('drag-hint').style.display='none';

  const toTranslate=allWords.filter(w=>!wordDict[w]);
  if(toTranslate.length){
    try{
      const translations=await deepl(toTranslate);
      toTranslate.forEach((w,i)=>wordDict[w]=translations[i]);
    }catch(e){alert('번역 오류: '+e.message);}
  }

  document.getElementById('loading-bar').style.display='none';
  document.getElementById('start-btn').disabled=false;
  renderReader(tokens,known);
}

function tokenize(text){
  const result=[],re=/([a-zA-ZÀ-ÿ]+(?:['''][a-zA-ZÀ-ÿ]+)?)|(\s+)|([^\w\s])/g;
  let m;
  while((m=re.exec(text))!==null){
    if(m[1]) result.push({type:'word',display:m[1],clean:m[1].toLowerCase().replace(/[''']/g,'')});
    else if(m[2]) result.push({type:'space',display:m[2]});
    else result.push({type:'punct',display:m[3]});
  }
  return result;
}

function renderReader(tokens,known){
  const reader=document.getElementById('reader');
  reader.innerHTML='';allWordEls=[];
  let idx=0;
  tokens.forEach(tok=>{
    if(tok.type!=='word'){reader.appendChild(document.createTextNode(tok.display));return;}
    const clean=tok.clean;
    if(known.has(clean)){reader.appendChild(document.createTextNode(tok.display));return;}
    const span=document.createElement('span');
    span.textContent=tok.display;
    span.dataset.word=clean;span.dataset.idx=idx++;
    span.className='word';
    wordStatus[clean]=wordStatus[clean]||'unknown';
    applyStatusClass(span);
    reader.appendChild(span);
    allWordEls.push(span);
  });
  setupPointer(reader);
  updateStats();
  document.getElementById('stats').style.display='flex';
  document.getElementById('done-btn-wrap').style.display='block';
  document.getElementById('drag-hint').style.display='block';
}

function getWordAt(x,y){const el=document.elementFromPoint(x,y);return el&&el.classList.contains('word')?el:null;}
function highlightRange(from,to){const lo=Math.min(from,to),hi=Math.max(from,to);allWordEls.forEach(el=>el.classList.toggle('drag-hl',+el.dataset.idx>=lo&&+el.dataset.idx<=hi));}
function clearHL(){allWordEls.forEach(el=>el.classList.remove('drag-hl'));}

function setupPointer(reader){
  reader.addEventListener('pointerdown',e=>{
    const w=getWordAt(e.clientX,e.clientY);if(!w)return;
    startIdx=+w.dataset.idx;dragging=false;
    hideWordPanel();hidePhrasePanel();
  });
  reader.addEventListener('pointermove',e=>{
    if(startIdx===null)return;
    const w=getWordAt(e.clientX,e.clientY);if(!w)return;
    if(+w.dataset.idx!==startIdx)dragging=true;
    if(dragging)highlightRange(startIdx,+w.dataset.idx);
  });
  reader.addEventListener('pointerup',e=>{
    if(startIdx===null)return;
    const w=getWordAt(e.clientX,e.clientY);
    const endIdx=w?+w.dataset.idx:startIdx;
    if(!dragging){
      const el=allWordEls[startIdx];clearHL();startIdx=null;
      if(el)showWordPanel(el);return;
    }
    const from=Math.min(startIdx,endIdx),to=Math.max(startIdx,endIdx);
    const phrase=allWordEls.slice(from,to+1).map(el=>el.textContent).join(' ').trim();
    clearHL();startIdx=null;dragging=false;
    if(phrase)showPhrasePanel(phrase);
  });
  reader.addEventListener('pointercancel',()=>{clearHL();startIdx=null;dragging=false;});
}

function showWordPanel(el){
  currentWord=el.dataset.word;clickedWords.add(currentWord);
  document.getElementById('panel-word').textContent=el.textContent;
  document.getElementById('meaning-input').value=wordDict[currentWord]||'';
  document.getElementById('word-panel').classList.add('show');
  hidePhrasePanel();
}
function hideWordPanel(){document.getElementById('word-panel').classList.remove('show');currentWord=null;}

async function retranslateWord(){
  if(!currentWord)return;
  const btn=document.getElementById('retranslate-btn');
  btn.innerHTML='<span class="mini-spinner"></span>';btn.disabled=true;
  try{
    const word=document.getElementById('panel-word').textContent;
    const [result]=await deepl([word]);
    wordDict[currentWord]=result;
    document.getElementById('meaning-input').value=result;
  }catch(e){alert(e.message);}
  btn.innerHTML='↺ 다시 번역';btn.disabled=false;
}

async function showPhrasePanel(phrase){
  currentPhrase=phrase;
  document.getElementById('phrase-panel-word').textContent=phrase;
  const existing=phraseDict[phrase];
  document.getElementById('phrase-meaning-input').value=existing?existing.meaning:'';
  document.getElementById('phrase-panel').classList.add('show');
  hideWordPanel();
  if(!existing||!existing.meaning)retranslatePhrase();
}
function hidePhrasePanel(){document.getElementById('phrase-panel').classList.remove('show');currentPhrase=null;}

async function retranslatePhrase(){
  if(!currentPhrase)return;
  const btn=document.getElementById('phrase-retranslate-btn');
  btn.innerHTML='<span class="mini-spinner"></span>';btn.disabled=true;
  try{
    const [result]=await deepl([currentPhrase]);
    if(!phraseDict[currentPhrase])phraseDict[currentPhrase]={status:null,meaning:''};
    phraseDict[currentPhrase].meaning=result;
    document.getElementById('phrase-meaning-input').value=result;
  }catch(e){alert(e.message);}
  btn.innerHTML='↺ 다시 번역';btn.disabled=false;
}

function setStatus(n){
  if(!currentWord)return;
  const edited=document.getElementById('meaning-input').value.trim();
  if(edited)wordDict[currentWord]=edited;
  wordStatus[currentWord]=n;
  allWordEls.filter(el=>el.dataset.word===currentWord).forEach(el=>applyStatusClass(el));
  updateStats();hideWordPanel();
}

function savePhraseStatus(n){
  if(!currentPhrase)return;
  const meaning=document.getElementById('phrase-meaning-input').value.trim();
  phraseDict[currentPhrase]={status:n,meaning};
  updateStats();hidePhrasePanel();
}

function applyStatusClass(el){
  const s=wordStatus[el.dataset.word];el.className='word';
  if(s==='unknown')el.classList.add('unknown');
  else if(s===1)el.classList.add('status-1');
  else if(s===2)el.classList.add('status-2');
  else if(s===3)el.classList.add('status-3');
}

function markAllUnclickedAsKnown(){
  Object.keys(wordStatus).forEach(w=>{
    if(!clickedWords.has(w)){wordStatus[w]=3;allWordEls.filter(el=>el.dataset.word===w).forEach(el=>applyStatusClass(el));}
  });
  updateStats();document.getElementById('done-btn-wrap').style.display='none';
  saveVocab();
}

function updateStats(){
  const v=Object.values(wordStatus);
  document.getElementById('s-total').textContent=v.filter(x=>x==='unknown').length;
  document.getElementById('s-retry').textContent=v.filter(x=>x===1).length;
  document.getElementById('s-review').textContent=v.filter(x=>x===2).length;
  document.getElementById('s-known3').textContent=v.filter(x=>x===3).length;
}

function filterVocab(f,btn){
  vocabFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderVocab();
}

function renderVocab(){
  const list=document.getElementById('vocab-list');
  let items=[];
  if(vocabFilter!=='phrase'){
    Object.entries(wordStatus).filter(([,v])=>v!=='unknown'&&(vocabFilter==='all'||v===vocabFilter))
      .forEach(([word,status])=>items.push({word,meaning:wordDict[word]||'',status,isPhrase:false}));
  }
  if(vocabFilter==='all'||vocabFilter==='phrase'){
    Object.entries(phraseDict).forEach(([phrase,{status,meaning}])=>
      items.push({word:phrase,meaning,status,isPhrase:true}));
  }
  if(!items.length){list.innerHTML='<p class="empty-msg" style="padding:1.5rem 0">해당하는 단어가 없어요.</p>';return;}
  const order={1:0,2:1,3:2};
  items.sort((a,b)=>(order[a.status]??3)-(order[b.status]??3));
  const labels={1:'다시 보기',2:'복습 중',3:'아는 단어'};
  const cls={1:'b1',2:'b2',3:'b3'};
  list.innerHTML=items.map(({word,meaning,status,isPhrase})=>`
    <div class="vocab-item">
      <span class="vocab-word">${word}</span>
      <input class="vocab-meaning-edit" value="${meaning.replace(/"/g,'&quot;')}" onchange="updateMeaning('${word.replace(/'/g,"\\'")}',this.value,${isPhrase})">
      <span class="badge ${isPhrase?'bphrase':cls[status]||''}">${isPhrase?'💬 표현':labels[status]||''}</span>
    </div>`).join('');
}

function updateMeaning(word,val,isPhrase){
  if(isPhrase){if(phraseDict[word])phraseDict[word].meaning=val;}
  else wordDict[word]=val;
}
</script>
</body>
</html>
